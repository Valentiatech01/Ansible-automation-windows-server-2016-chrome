---
- name: Uninstall Notepad++ using dynamic registry search
  hosts: windows
  gather_facts: yes

  tasks:
    - name: Search registry for Notepad++ uninstall key
      ansible.windows.win_shell: |
        $regPaths = @(
          "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*",
          "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*"
        )
        $nppKey = Get-ItemProperty $regPaths -ErrorAction SilentlyContinue |
                  Where-Object { $_.DisplayName -like "*Notepad++*" } |
                  Select-Object -First 1
        if ($nppKey) {
          Write-Output $nppKey.PSChildName
        }
      register: npp_product_id
      failed_when: npp_product_id.stdout == ""

    - name: Uninstall Notepad++ using discovered product ID
      ansible.windows.win_package:
        product_id: "{{ npp_product_id.stdout }}"
        state: absent
      register: uninstall_result
      failed_when: uninstall_result.rc not in [0, 19, 1605, 1614, 3010]
      changed_when: uninstall_result.rc in [0, 19, 3010]

    - name: Restart Windows Explorer to complete cleanup
      ansible.windows.win_shell: |
        Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
      changed_when: false
      ignore_errors: yes

    - name: Display uninstall result
      ansible.builtin.debug:
        msg: "Notepad++ uninstall completed with RC: {{ uninstall_result.rc }}"
