---
- name: Force uninstall Notepad++ using multiple methods
  hosts: windows
  gather_facts: yes

  tasks:
    - name: Kill any running Notepad++ processes
      ansible.windows.win_shell: |
        Get-Process -Name "notepad++" -ErrorAction SilentlyContinue | Stop-Process -Force
      ignore_errors: yes
      changed_when: false

    - name: Get Notepad++ uninstaller path
      ansible.windows.win_shell: |
        $uninstaller = Get-ChildItem -Path "C:\Program Files\Notepad++" -Filter "uninstall.exe" -Recurse -ErrorAction SilentlyContinue |
                       Select-Object -First 1
        if ($uninstaller) {
          Write-Output $uninstaller.FullName
        }
      register: uninstaller_path
      ignore_errors: yes

    - name: Method 1 - Uninstall with /S flag
      ansible.windows.win_shell: '"{{ uninstaller_path.stdout }}" /S'
      when: uninstaller_path.stdout != ""
      ignore_errors: yes
      register: uninstall_result1

    - name: Method 2 - Uninstall with /S and --force
      ansible.windows.win_shell: '"{{ uninstaller_path.stdout }}" /S --force'
      when: uninstaller_path.stdout != ""
      ignore_errors: yes
      register: uninstall_result2

    - name: Method 3 - Delete Notepad++ folder (if still exists)
      ansible.windows.win_file:
        path: C:\Program Files\Notepad++
        state: absent
      ignore_errors: yes

    - name: Method 4 - Delete Notepad++ data in ProgramData
      ansible.windows.win_file:
        path: C:\ProgramData\Notepad++
        state: absent
      ignore_errors: yes

    - name: Method 5 - Delete Notepad++ from AppData (Per-user install)
      ansible.windows.win_shell: |
        $appDataPaths = @(
          "$env:APPDATA\Notepad++",
          "$env:LOCALAPPDATA\Notepad++",
          "$env:PROGRAMDATA\Notepad++"
        )
        foreach ($path in $appDataPaths) {
          if (Test-Path $path) {
            Remove-Item -Path $path -Recurse -Force -ErrorAction SilentlyContinue
          }
        }
      ignore_errors: yes
      changed_when: false

    - name: Method 6 - Remove registry entries
      ansible.windows.win_shell: |
        $regPaths = @(
          "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*",
          "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*"
        )
        Get-ItemProperty $regPaths -ErrorAction SilentlyContinue |
        Where-Object { $_.DisplayName -like "*Notepad++*" } |
        ForEach-Object {
          $keyPath = $_.PSPath
          Remove-Item -Path $keyPath -Force -ErrorAction SilentlyContinue
        }
      ignore_errors: yes
      changed_when: false

    - name: Restart Windows Explorer to complete cleanup
      ansible.windows.win_shell: |
        Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
      changed_when: false
      ignore_errors: yes

    - name: Display uninstall results
      ansible.builtin.debug:
        msg: 
          - "Uninstall result (Method 1): {{ uninstall_result1.rc | default('N/A') }}"
          - "Uninstall result (Method 2): {{ uninstall_result2.rc | default('N/A') }}"
          - "Uninstaller path: {{ uninstaller_path.stdout | default('Not found') }}"
