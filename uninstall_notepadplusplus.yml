---
- name: Force uninstall Notepad++ using multiple methods
  hosts: windows
  gather_facts: yes

  tasks:
    - name: Kill any running Notepad++ processes
      ansible.windows.win_shell: |
        Get-Process -Name "notepad++" -ErrorAction SilentlyContinue | Stop-Process -Force
      ignore_errors: yes
      changed_when: false

    - name: Method 1 - Uninstall using QuietUninstallString
      ansible.windows.win_shell: |
        $uninstallString = (Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\Notepad++" -ErrorAction SilentlyContinue).QuietUninstallString
        if ($uninstallString) {
          Start-Process -FilePath "cmd.exe" -ArgumentList "/c $uninstallString" -Wait -NoNewWindow
        }
      register: uninstall_result1
      ignore_errors: yes

    - name: Method 2 - Uninstall using MSIEXEC (if it's an MSI)
      ansible.windows.win_shell: |
        $productCode = (Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\Notepad++" -ErrorAction SilentlyContinue).PSChildName
        if ($productCode -match '{.*}') {
          Start-Process -FilePath "msiexec.exe" -ArgumentList "/x $productCode /qn /norestart" -Wait -NoNewWindow
        }
      register: uninstall_result2
      ignore_errors: yes

    - name: Method 3 - Delete Notepad++ folder
      ansible.windows.win_file:
        path: C:\Program Files\Notepad++
        state: absent
      ignore_errors: yes

    - name: Method 4 - Delete Notepad++ ProgramData folder
      ansible.windows.win_file:
        path: C:\ProgramData\Notepad++
        state: absent
      ignore_errors: yes

    - name: Method 5 - Delete AppData folders
      ansible.windows.win_shell: |
        $paths = @(
          "$env:APPDATA\Notepad++",
          "$env:LOCALAPPDATA\Notepad++"
        )
        foreach ($path in $paths) {
          if (Test-Path $path) {
            Remove-Item -Path $path -Recurse -Force -ErrorAction SilentlyContinue
          }
        }
      ignore_errors: yes
      changed_when: false

    - name: Method 6 - Remove registry entry
      ansible.windows.win_shell: |
        Remove-Item -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\Notepad++" -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "HKCU:\SOFTWARE\Notepad++" -Recurse -Force -ErrorAction SilentlyContinue
      ignore_errors: yes
      changed_when: false

    - name: Method 7 - Uninstall using wmic
      ansible.windows.win_shell: |
        wmic product where "name like '%Notepad++%'" call uninstall /nointeractive
      ignore_errors: yes
      register: uninstall_result3

    - name: Restart Windows Explorer
      ansible.windows.win_shell: |
        Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
      changed_when: false
      ignore_errors: yes

    - name: Display uninstall results
      ansible.builtin.debug:
        msg: 
          - "Method 1 (QuietUninstallString): {{ uninstall_result1.rc | default('N/A') }}"
          - "Method 2 (MSIEXEC): {{ uninstall_result2.rc | default('N/A') }}"
          - "Method 7 (WMIC): {{ uninstall_result3.rc | default('N/A') }}"
